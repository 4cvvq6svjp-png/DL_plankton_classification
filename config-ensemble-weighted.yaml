# F1-weighted ensemble for prediction.
# Each model votes with a weight proportional to its f1_score.
# Weights are normalized (sum = 1) in the script.
#
# Usage:
#   python -m torchtmpl.predict_ensemble_weighted config-ensemble-weighted.yaml
#   python -m torchtmpl.predict_ensemble_weighted config-ensemble-weighted.yaml path/to/submission.csv

models:
  - config: path/to/run1/config.yaml
    checkpoint: path/to/run1/best_model.pt
    f1_score: 0.70

  - config: path/to/run2/config.yaml
    checkpoint: path/to/run2/best_model.pt
    f1_score: 0.62

  - config: path/to/run3/config.yaml
    checkpoint: path/to/run3/best_model.pt
    f1_score: 0.60


