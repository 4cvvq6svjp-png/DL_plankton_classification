# ══════════════════════════════════════════════════════════
#  ConvNeXt-Tiny – RESUME from best checkpoint (F1=0.60)
#  Toutes les améliorations: sampler amorti, FocalLoss alpha,
#  label smoothing, Mixup/CutMix, CosineAnnealingLR simple
# ══════════════════════════════════════════════════════════

data:
  root_dir: '/mounts/datasets/datasets/2025-ZooCamChallenge'
  batch_size: 32
  num_workers: 8
  valid_ratio: 0.2
  img_size: 224
  resize_size: 256
  sampler_power: 0.5

model:
  class: HfModel
  name: 'facebook/convnext-tiny-224'
  freeze_backbone: false

resume:
  checkpoint: './logs/HfModel_20260302_133002_0/best_model.pt'

loss:
  class: FocalLoss
  gamma: 2.0
  label_smoothing: 0.1
  use_class_weights: true

optim:
  backbone_lr: 1.0e-5
  finetune_head_lr: 1.0e-4
  weight_decay: 0.05
  eta_min: 1.0e-7

nepochs: 40
warmup_epochs: 0
use_amp: true

mix:
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

logging:
  logdir: './logs'
