# ══════════════════════════════════════════════════════════
#  ConvNeXt-Tiny – RESUME from best checkpoint (F1=0.60)
#  ReduceLROnPlateau + LR rehaussés + warmup fine-tuning
# ══════════════════════════════════════════════════════════

data:
  root_dir: '/mounts/datasets/datasets/2025-ZooCamChallenge'
  batch_size: 32
  num_workers: 8
  valid_ratio: 0.2
  img_size: 224
  resize_size: 256
  sampler_power: 0.5

model:
  class: HfModel
  name: 'facebook/convnext-tiny-224'
  freeze_backbone: false

resume:
  checkpoint: './logs/convnext_best_062/best_model.pt'

loss:
  class: FocalLoss
  gamma: 2.0
  label_smoothing: 0.1
  use_class_weights: true

optim:
  backbone_lr: 3.0e-5
  finetune_head_lr: 3.0e-4
  weight_decay: 0.05
  scheduler: ReduceLROnPlateau
  scheduler_patience: 5
  scheduler_factor: 0.5
  eta_min: 1.0e-6

nepochs: 40
warmup_epochs: 0
finetune_warmup: 3
use_amp: true

mix:
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

logging:
  logdir: './logs'
