# ══════════════════════════════════════════════════════════
#  ConvNeXt (torchvision) – entraînement from scratch / ImageNet
#  Tiny par défaut ; pour Small/Base/Large changer model.name
# ══════════════════════════════════════════════════════════

data:
  root_dir: '/mounts/datasets/datasets/2025-ZooCamChallenge'
  batch_size: 64
  num_workers: 8
  valid_ratio: 0.2
  img_size: 224
  resize_size: 256
  sampler_power: 0.5

model:
  class: TorchVisionConvNeXt
  name: convnext_tiny   # ou convnext_small, convnext_base, convnext_large
  freeze_backbone: false

loss:
  class: FocalLoss
  gamma: 2.0
  label_smoothing: 0.1
  use_class_weights: true

optim:
  algo: AdamW
  backbone_lr: 3.0e-5
  finetune_head_lr: 3.0e-4
  weight_decay: 0.05
  scheduler: CosineAnnealing
  eta_min: 1.0e-6

nepochs: 40
warmup_epochs: 0
finetune_warmup: 3
use_amp: true

mix:
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  prob: 0.5

logging:
  logdir: './logs'
